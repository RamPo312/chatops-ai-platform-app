name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  frontend-build-scan-push:
    name: Frontend Build Scan Push
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./frontend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend app
        run: npm run build

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: rampo3
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build frontend Docker image
        run: |
          docker build -t rampo3/chatops-frontend:latest .

      - name: Scan frontend image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: rampo3/chatops-frontend:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push frontend Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push rampo3/chatops-frontend:latest

  backend-build-scan-push:
    name: Backend Build Scan Push
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./backend

    steps:
      - name: Checkout source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backend smoke import check
        run: |
          python -c "from app.main import app; print('Backend import successful')"

      - name: Log in to Docker Hub
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: rampo3
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build backend Docker image
        run: |
          docker build -t rampo3/chatops-backend:latest .

      - name: Scan backend image with Trivy
        uses: aquasecurity/trivy-action@0.24.0
        with:
          image-ref: rampo3/chatops-backend:latest
          format: table
          exit-code: 0
          ignore-unfixed: true
          vuln-type: os,library
          severity: CRITICAL,HIGH

      - name: Push backend Docker image
        if: github.ref == 'refs/heads/main'
        run: |
          docker push rampo3/chatops-backend:latest
